services:
  web:
    image: node:18
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3000:3000"
    environment:
      - MONGO_URL=mongodb://mongo:27017/remarkable-rss
    env_file:
      - .env
    command: sh -c "npm install && npm run dev"
    depends_on:
      mongo:
        condition: service_healthy
    healthcheck:
      test: wget --spider -q http://localhost:3000
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: mongosh --eval "db.runCommand('ping').ok" --quiet
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mongo-data:
  node_modules:
